name: Daily Weather Scraper

on:
  schedule:
    - cron: '0 11 * * *'  # Automatically runs every single day at 6:00 AM Central Time
  workflow_dispatch:     # Adds a manual button so you can test it instantly

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo files
        uses: actions/checkout@v4

      - name: Load R Environment
        uses: r-lib/actions/setup-r@v2

      - name: Install jsonlite package
        run: Rscript -e 'install.packages("jsonlite")'

      - name: Run Weather Script
        run: Rscript scrape_weather.R

      - name: Save new CSV data to account
        run: |
          git config --global user.name "GitHub Automation Bot"
          git config --global user.email "actions@github.com"
          git add weather_archive.csv
          git commit -m "Automated data sync: $(date +'%Y-%m-%d')" || exit 0
          git push
