name: Daily Weather Scraper
on:
  schedule:
    - cron: '0 11 * * *'  # Runs automatically at 6:00 AM Central Time
  workflow_dispatch:     # Adds the manual run button

# This is the missing security key that forces GitHub to allow file saving
permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Data
        run: |
          # 1. Download raw weather metrics safely via cloud tools
          curl -s "https://open-meteo.com" > raw.json
          
          # 2. Build the CSV file if it is missing
          if [ ! -f weather_archive.csv ]; then 
            echo "scrape_date,max_temp,min_temp" > weather_archive.csv
          fi
          
          # 3. Pull the specific data values out of the text response
          echo "$(date +'%Y-%m-%d'),$(grep -o '"temperature_2m_max":\[[^]]*\]' raw.json | cut -d'[' -f2 | cut -d',' -f1),$(grep -o '"temperature_2m_min":\[[^]]*\]' raw.json | cut -d'[' -f2 | cut -d',' -f1)" >> weather_archive.csv
          
      - name: Save Spreadsheet to Account
        run: |
          git config --global user.name "Automation"
          git config --global user.email "actions@github.com"
          git add weather_archive.csv
          git commit -m "sync" || exit 0
          git push
Use code with caution.
