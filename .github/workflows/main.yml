name: Daily Weather Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'  # Automatically runs every single day at 6:00 AM Central Time

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load R Environment
        uses: r-lib/actions/setup-r@v2

      - name: Fetch and Process 10-Day Forecast
        run: |
          cat << 'EOF' > run_10day.R
          # Use the explicit 10-day data window for your location
          url <- "https://open-meteo.com"
          lines <- readLines(url, warn = FALSE)
          
          # Isolate text data arrays using text pattern matching
          dates_raw <- regmatches(lines, regexpr('(?<="time":\\[)[^]]+', lines, perl=TRUE))
          maxs_raw  <- regmatches(lines, regexpr('(?<="temperature_2m_max":\\[)[^]]+', lines, perl=TRUE))
          mins_raw  <- regmatches(lines, regexpr('(?<="temperature_2m_min":\\[)[^]]+', lines, perl=TRUE))
          
          # Convert strings into clean individual columns
          dates <- gsub('"', '', unlist(strsplit(dates_raw, ",")))
          maxs  <- as.numeric(unlist(strsplit(maxs_raw, ",")))
          mins  <- as.numeric(unlist(strsplit(mins_raw, ",")))
          
          # Structure into a 10-row dataset layout
          forecast_df <- data.frame(
            scrape_date   = Sys.Date(),
            forecast_date = dates,
            max_temp_f    = maxs,
            min_temp_f    = mins
          )
          
          file_name <- "weather_archive.csv"
          if (file.exists(file_name)) {
            write.table(forecast_df, file = file_name, append = TRUE, sep = ",", row.names = FALSE, col.names = FALSE)
          } else {
            write.csv(forecast_df, file = file_name, row.names = FALSE)
          }
          print("Successfully logged 10 days of weather data!")
          EOF
          Rscript run_10day.R

      - name: Save Spreadsheet to Account
        run: |
          git config --global user.name "Automation"
          git config --global user.email "actions@github.com"
          git add weather_archive.csv
          git commit -m "Fix database structure and pull full 10-day matrix" || exit 0
          git push
